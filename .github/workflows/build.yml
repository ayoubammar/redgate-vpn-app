name: Build RedGate VPN

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Submodule Resolver
        run: |
          update_submods() {
            if [ -f .gitmodules ]; then
              echo "Patching .gitmodules in $(pwd)"
              sed -i 's/git@github.com:/https:\/\/github.com\//g' .gitmodules
              sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' .gitmodules
              git submodule sync
              git submodule update --init
              
              git config --file .gitmodules --get-regexp path | awk '{ print $2 }' | while read modpath; do
                if [ -d "$modpath" ]; then
                  (cd "$modpath" && update_submods)
                fi
              done
            fi
          }
          export -f update_submods
          update_submods

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          make get CHANNEL=prod
          make gen CHANNEL=prod || true
          make android-apk-install-deps CHANNEL=prod || true

      - name: Download pre-built core libs
        run: make android-libs CHANNEL=prod

      - name: Download geo assets
        run: make get-geo-assets CHANNEL=prod || true

      - name: Build APK
        run: |
          make android-apk-release CHANNEL=prod || flutter build apk --release --target lib/main_prod.dart

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RedGate-VPN-Android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Submodule Resolver
        run: |
          update_submods() {
            if [ -f .gitmodules ]; then
              echo "Patching .gitmodules in $(pwd)"
              sed -i 's/git@github.com:/https:\/\/github.com\//g' .gitmodules
              sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' .gitmodules
              git submodule sync
              git submodule update --init
              
              git config --file .gitmodules --get-regexp path | awk '{ print $2 }' | while read modpath; do
                if [ -d "$modpath" ]; then
                  (cd "$modpath" && update_submods)
                fi
              done
            fi
          }
          export -f update_submods
          update_submods

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          make get CHANNEL=prod
          make gen CHANNEL=prod || true
          make windows-install-deps CHANNEL=prod || true

      - name: Download pre-built core libs
        run: make windows-libs CHANNEL=prod

      - name: Download geo assets
        run: make get-geo-assets CHANNEL=prod || true

      - name: Build Windows
        run: |
          make windows-release CHANNEL=prod || flutter build windows --release --target lib/main_prod.dart

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: RedGate-VPN-Windows
          path: |
            build/windows/x64/runner/Release/
            dist/
