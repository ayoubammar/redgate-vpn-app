name: Build RedGate VPN

on:
  workflow_dispatch:

env:
  CHANNEL: prod

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix submodule URLs and checkout
        run: |
          # Replace ssh urls in the main .gitmodules
          if [ -f .gitmodules ]; then
            sed -i 's/git@github.com:/https:\/\/github.com\//g' .gitmodules
            sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' .gitmodules
          fi
          git submodule sync
          git submodule update --init
          
          # Replace ssh urls in all nested .gitmodules
          find . -name .gitmodules -exec sed -i 's/git@github.com:/https:\/\/github.com\//g' {} +
          find . -name .gitmodules -exec sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' {} +
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          make get
          make gen || true
          make android-apk-install-deps || true

      - name: Download pre-built core libs
        run: make android-libs CHANNEL=prod

      - name: Download geo assets
        run: make get-geo-assets || true

      - name: Build APK
        run: |
          make android-apk-release CHANNEL=prod || flutter build apk --release --target lib/main.dart

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RedGate-VPN-Android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/**/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix submodule URLs and checkout
        run: |
          # Replace ssh urls in the main .gitmodules
          if [ -f .gitmodules ]; then
            sed -i 's/git@github.com:/https:\/\/github.com\//g' .gitmodules
            sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' .gitmodules
          fi
          git submodule sync
          git submodule update --init
          
          # Replace ssh urls in all nested .gitmodules
          find . -name .gitmodules -exec sed -i 's/git@github.com:/https:\/\/github.com\//g' {} +
          find . -name .gitmodules -exec sed -i 's/ssh:\/\/git@github.com\//https:\/\/github.com\//g' {} +
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          make get
          make gen || true
          make windows-install-deps || true

      - name: Download pre-built core libs
        run: make windows-libs CHANNEL=prod

      - name: Download geo assets
        run: make get-geo-assets || true

      - name: Build Windows
        run: |
          make windows-release CHANNEL=prod || flutter build windows --release --target lib/main.dart

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: RedGate-VPN-Windows
          path: |
            build/windows/x64/runner/Release/
            dist/
